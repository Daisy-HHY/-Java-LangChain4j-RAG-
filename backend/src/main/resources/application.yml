server:
  port: 8080

spring:
  application:
    name: kgqa-rag-system
  datasource:
    url: ${KGQA_DB_URL:jdbc:postgresql://localhost:5432/kgqa}
    username: ${KGQA_DB_USERNAME:postgres}
    password: ${KGQA_DB_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      dependency:
        type: none  # 关键！关闭数据库初始化依赖检测
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

# LangChain4j 配置
langchain4j:
  siliconflow:
    api-key: ${SILICONFLOW_API_KEY:}
    base-url: ${SILICONFLOW_BASE_URL:https://api.siliconflow.cn/v1}
    embedding-model: ${SILICONFLOW_EMBEDDING_MODEL:Qwen/Qwen3-Embedding-8B}
    chat-model: ${SILICONFLOW_CHAT_MODEL:MiniMaxAI/MiniMax-M2.5}

# 文件上传配置
upload:
  path: ./uploads

# 知识图谱配置
kgqa:
  cors:
    allowed-origins: ${KGQA_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}
  auth:
    token-secret: ${KGQA_AUTH_TOKEN_SECRET:${random.uuid}}
    token-ttl-seconds: ${KGQA_AUTH_TOKEN_TTL_SECONDS:86400}
    cookie-secure: ${KGQA_AUTH_COOKIE_SECURE:false}
    cookie-same-site: ${KGQA_AUTH_COOKIE_SAME_SITE:Lax}
    default-admin:
      username: ${KGQA_DEFAULT_ADMIN_USERNAME:admin}
      password: ${KGQA_DEFAULT_ADMIN_PASSWORD:admin123}
  tdb:
    path: ${KGQA_TDB_PATH:E:/Github_project/LangChain4j-KGQA/apache jena/tdb_drug_new}
    validate-on-startup: true
    query-timeout-seconds: ${KGQA_TDB_QUERY_TIMEOUT_SECONDS:10}
  # 本体 URI (kgdrug)
  ontology:
    base: http://www.kgdrug.com
  embedding:
    table: embeddings
  rag:
    reindex-on-startup: false
  data:
    import-kgdrug-to-vector-on-startup: false

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
  mapper-locations: classpath*:/mapper/**/*.xml

# 日志配置
logging:
  level:
    com.kgqa: DEBUG
    dev.langchain4j: DEBUG
